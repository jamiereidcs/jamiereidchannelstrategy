<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent — Jamie Reid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --near-black: #232325;
    --deep-forest: #1b3a2e;
    --forest-mid: #46624c;
    --sage: #687764;
    --grey-green: #a1aca6;
    --warm-grey: #bebfb9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--near-black);
    color: var(--warm-grey);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }
  .icon {
    width: 64px;
    height: 64px;
    background: var(--deep-forest);
    border: 2px solid var(--forest-mid);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px;
  }
  .icon svg { width: 28px; height: 28px; }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(32px, 5vw, 52px);
    color: var(--warm-grey);
    margin-bottom: 16px;
  }
  h1 em { font-style: italic; color: var(--grey-green); }
  p {
    font-size: 15px;
    line-height: 1.8;
    color: var(--sage);
    max-width: 400px;
    margin: 0 auto 40px;
  }
  a {
    display: inline-block;
    padding: 14px 32px;
    background: var(--deep-forest);
    color: var(--warm-grey);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid var(--forest-mid);
    transition: background 0.2s;
  }
  a:hover { background: var(--forest-mid); }
</style>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LL3TBPZYFN"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-LL3TBPZYFN');
</script>
</head>
<body>
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#a1aca6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <h1>Message <em>received.</em></h1>
  <p>Thanks for reaching out — I'll be in touch shortly. Looking forward to the conversation.</p>
  <a href="/">Back to site</a>
</body>
</html>
